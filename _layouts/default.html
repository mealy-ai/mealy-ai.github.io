<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <style>
    :root { --pink: #EC4899; --ink: #1f2937; --muted: #6b7280; --bg: #ffffff; --line: #eef0f3; }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.65;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 44px 22px 96px; }
    h1 { font-size: 32px; line-height: 1.2; margin: 0 0 18px; letter-spacing: -0.01em; }
    h2 { font-size: 22px; margin: 36px 0 10px; letter-spacing: -0.01em; }
    h3 { font-size: 18px; margin: 26px 0 8px; }
    p { margin: 0 0 14px; }
    ul, ol { padding-left: 22px; margin: 0 0 14px; }
    li { margin: 6px 0; }
    a { color: var(--pink); text-decoration: none; }
    a:hover { text-decoration: underline; }
    strong { font-weight: 700; }
    hr { border: 0; border-top: 1px solid var(--line); margin: 28px 0; }
    code { background: #f6f7f9; padding: 1px 5px; border-radius: 5px; font-size: 0.92em; }
    .brand { color: var(--pink); font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; font-size: 13px; margin: 0 0 8px; }
    .foot { margin-top: 56px; padding-top: 18px; border-top: 1px solid var(--line); font-size: 13px; color: var(--muted); }
    .foot a { color: var(--muted); }
    .foot a:hover { color: var(--pink); }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="brand">Mealy</p>
    {{ content }}
    <div class="foot">
      <a href="{{ '/privacy/' | relative_url }}">Privacy Policy</a>
      &nbsp;&middot;&nbsp;
      <a href="{{ '/terms/' | relative_url }}">Terms of Service</a>
      &nbsp;&middot;&nbsp;
      <a href="{{ '/support/' | relative_url }}">Support</a>
    </div>
  </main>
</body>
</html>
